name: ClalMobile CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint . --max-warnings 0 || echo "::warning::ESLint has warnings (non-blocking)"

  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run Vitest with coverage
        run: npx vitest run --coverage
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [unit-integration-tests]
    # Use 127.0.0.1 for Supabase URL so server-side calls fail fast (ECONNREFUSED)
    # instead of hanging — pages render empty-state UI which is what our specs
    # assert on. No real Supabase traffic ever leaves the runner.
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key-0000000000000000000000000000000
      SUPABASE_SERVICE_ROLE_KEY: test-service-key-0000000000000000000000000000000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Install Playwright browsers (system deps always)
        run: npx playwright install --with-deps chromium

      # Mock Supabase MUST be running before `next build` because some Server
      # Components (e.g. /store) call Supabase during prerender.
      - name: Start mock Supabase server (background)
        run: node tests/ci/mock-supabase.mjs > /tmp/mock-sb.log 2>&1 &

      - name: Wait for mock Supabase
        run: npx wait-on --timeout 30000 --interval 250 http://127.0.0.1:54321

      - name: Build Next.js app
        run: npm run build:next

      - name: Start Next.js server (background)
        run: npm run start > /tmp/next-server.log 2>&1 &

      - name: Wait for server (fails the job if the server dies)
        run: npx wait-on --timeout 120000 --interval 500 http://localhost:3000

      - name: Run Playwright tests (chromium desktop only in CI)
        run: npx playwright test --project=chromium-desktop
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== Next.js server log ==="
          tail -200 /tmp/next-server.log || true
          echo ""
          echo "=== Mock Supabase log ==="
          tail -100 /tmp/mock-sb.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build:
    name: Build check
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      # Mock Supabase needs to be running for prerender to succeed.
      - name: Start mock Supabase server
        run: node tests/ci/mock-supabase.mjs > /tmp/mock-sb.log 2>&1 &
      - name: Wait for mock Supabase
        run: npx wait-on --timeout 30000 --interval 250 http://127.0.0.1:54321
      - name: Next.js build
        run: npm run build:next
