name: Weekly Employee Summary

on:
  schedule:
    # Every Sunday 05:00 UTC (08:00 Asia/Jerusalem local, ~07:00 DST).
    - cron: "0 5 * * 0"
  workflow_dispatch:

concurrency:
  group: weekly-summary
  cancel-in-progress: false

jobs:
  send:
    name: Send weekly WhatsApp summaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run weekly summary
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YCLOUD_API_KEY: ${{ secrets.YCLOUD_API_KEY }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          # Default to dry-run unless explicitly set to "false" in the
          # repo variables. Protects against accidental mass-sending
          # when testing the workflow.
          WEEKLY_SUMMARY_DRY_RUN: ${{ vars.WEEKLY_SUMMARY_DRY_RUN || 'true' }}
        run: npx tsx scripts/weekly-employee-summary.ts

      - name: Report failure to alert channel
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[weekly-summary] weekly WhatsApp summary failed';
            const body = `Weekly employee summary workflow failed.

            - Run: ${context.runId}
            - Workflow: ${context.workflow}
            - See: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            `;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'alert',
              per_page: 50,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing (run ${context.runId}).`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['alert', 'weekly-summary'],
              });
            }
