name: Synthetic user journeys

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch:

permissions:
  contents: read
  issues: write # for alert dedup via GitHub Issues

jobs:
  synthetic:
    name: Playwright user journeys on production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run synthetic user journeys
        id: synthetic
        env:
          SYNTHETIC_BASE_URL: ${{ secrets.SYNTHETIC_BASE_URL || 'https://clalmobile.com' }}
        run: npx playwright test --config=playwright.synthetic.config.ts

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-report
          path: synthetic-report/
          retention-days: 30

      - name: Deduped alert on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_SOURCE: synthetic
          YCLOUD_API_KEY: ${{ secrets.YCLOUD_API_KEY }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          ALERT_WHATSAPP: ${{ secrets.ADMIN_PERSONAL_PHONE }}
          ALERT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: node tests/monitor/alert-dedup.js

      - name: Auto-recover open alert on success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_SOURCE: synthetic
          YCLOUD_API_KEY: ${{ secrets.YCLOUD_API_KEY }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          ALERT_WHATSAPP: ${{ secrets.ADMIN_PERSONAL_PHONE }}
          ALERT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: node tests/monitor/alert-dedup.js --recover
