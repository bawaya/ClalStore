name: Hourly Monitor

on:
  schedule:
    - cron: "0 * * * *" # every hour on the hour
  workflow_dispatch:

permissions:
  contents: read
  issues: write # alert-dedup creates/closes alert issues

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Health check
        id: health
        env:
          MONITOR_URL: ${{ secrets.MONITOR_URL || 'https://clalmobile.com' }}
        run: node tests/monitor/check.js
      - name: Deduped alert on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_SOURCE: monitor
          YCLOUD_API_KEY: ${{ secrets.YCLOUD_API_KEY }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          ALERT_WHATSAPP: ${{ secrets.ADMIN_PERSONAL_PHONE }}
          ALERT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: node tests/monitor/alert-dedup.js
      - name: Auto-recover on success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_SOURCE: monitor
          YCLOUD_API_KEY: ${{ secrets.YCLOUD_API_KEY }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          ALERT_WHATSAPP: ${{ secrets.ADMIN_PERSONAL_PHONE }}
          ALERT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: node tests/monitor/alert-dedup.js --recover
