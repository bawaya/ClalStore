name: Security scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC

jobs:
  # ────────────────────────────────────────────────────────────
  # gitleaks — detect committed secrets (API keys, JWTs, etc)
  # ────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is optional for org-scale use

  # ────────────────────────────────────────────────────────────
  # npm audit — fail on HIGH/CRITICAL
  # ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Run npm audit
        # Production deps only — tooling may have transitively-vulnerable devDeps
        # that don't ship to production. Adjust to full audit if needed.
        run: |
          set +e
          OUT=$(npm audit --production --audit-level=high --json)
          CODE=$?
          echo "$OUT" > audit.json
          if [ $CODE -ne 0 ]; then
            echo "### npm audit — HIGH or CRITICAL vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            node -e '
              const a = require("./audit.json");
              const vulns = a.vulnerabilities || {};
              for (const [name, v] of Object.entries(vulns)) {
                if (v.severity === "high" || v.severity === "critical") {
                  console.log("- " + name + " (" + v.severity + "): " + (v.via?.map(x => x.title || x).join("; ") || "see advisories"));
                }
              }
            ' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ npm audit: no HIGH or CRITICAL issues"
