name: Security scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC

jobs:
  # ────────────────────────────────────────────────────────────
  # gitleaks — detect committed secrets (API keys, JWTs, etc)
  # ────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is optional for org-scale use

  # ────────────────────────────────────────────────────────────
  # npm audit — fail on HIGH/CRITICAL
  # ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Run npm audit with allowlist
        # Production deps only. Uses .github/audit-allowlist.json to accept
        # known-unfixable vulns with a reason + expiry — unknown vulns still
        # fail the build.
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > audit.json
          set -e
          node .github/audit-check.js
        env:
          AUDIT_JSON: audit.json
          ALLOWLIST: .github/audit-allowlist.json
