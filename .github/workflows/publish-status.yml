name: Publish Status Page

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch:

# Allow only one concurrent deployment, skipping queued runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write # publish to GitHub Pages via native API
  id-token: write # required for github-pages environment

jobs:
  build:
    name: Build status snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Read the previous history.json (if any) so we can append to it rather
      # than overwriting. We fetch from the last successful Pages deployment.
      - name: Restore previous history.json
        continue-on-error: true
        run: |
          mkdir -p _site
          curl -fsSL "https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d/ -f2)/history.json" \
            -o _site/history.json 2>/dev/null || echo "[]" > _site/history.json

      - name: Run status snapshot
        env:
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL || 'https://clalmobile.com' }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          STATUS_FILE: _site/status.json
          STATUS_HISTORY_FILE: _site/history.json
        run: node tests/monitor/publish-status.js

      - name: Write human-readable index.html
        run: |
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>ClalMobile — Status</title>
              <style>
                :root { color-scheme: light dark; }
                body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
                .pill { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-weight: 600; font-size: 0.875rem; }
                .up, .operational { background: #16a34a; color: white; }
                .degraded { background: #d97706; color: white; }
                .down { background: #dc2626; color: white; }
                table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
                th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid rgba(128,128,128,0.3); }
                .sparkline { display: flex; gap: 2px; align-items: end; height: 48px; margin-top: 0.5rem; }
                .sparkline span { flex: 1; background: #16a34a; min-height: 8px; }
                .sparkline span.degraded { background: #d97706; }
                .sparkline span.down { background: #dc2626; }
                small { color: #888; }
                h1 { margin-bottom: 0.25rem; }
                .subtitle { color: #888; margin-top: 0; }
              </style>
            </head>
            <body>
              <h1>ClalMobile · Status</h1>
              <p class="subtitle">Live production health — updated every 15 minutes</p>
              <p id="overall"></p>
              <table>
                <thead><tr><th>Service</th><th>Status</th><th>Response</th></tr></thead>
                <tbody id="services"></tbody>
              </table>
              <h2>Last 7 days</h2>
              <div id="sparkline" class="sparkline"></div>
              <p><small id="lastcheck"></small></p>
              <script>
                (async () => {
                  const [snap, hist] = await Promise.all([
                    fetch('./status.json', { cache: 'no-store' }).then(r => r.json()),
                    fetch('./history.json', { cache: 'no-store' }).then(r => r.json()).catch(() => []),
                  ]);
                  const pillCls = { operational: 'operational', up: 'up', degraded: 'degraded', down: 'down' }[snap.status] || 'degraded';
                  document.getElementById('overall').innerHTML =
                    '<span class="pill ' + pillCls + '">' + snap.status.toUpperCase() + '</span>';
                  document.getElementById('services').innerHTML = Object.entries(snap.services)
                    .map(([k, v]) => '<tr><td>' + k + '</td><td>' + v.status + '</td><td>' + v.responseMs + 'ms</td></tr>')
                    .join('');
                  const sl = document.getElementById('sparkline');
                  sl.innerHTML = hist.map(h => {
                    const cls = { operational: '', up: '', degraded: 'degraded', down: 'down' }[h.s] || '';
                    return '<span class="' + cls + '" title="' + h.t + '"></span>';
                  }).join('');
                  document.getElementById('lastcheck').textContent =
                    'Last check: ' + snap.lastCheck + ' · ' + hist.length + ' samples';
                })().catch(e => {
                  document.body.insertAdjacentHTML(
                    'beforeend',
                    '<p style="color:#dc2626">Error loading status: ' + e.message + '</p>'
                  );
                });
              </script>
            </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
