name: Feature request
description: Propose a new feature or improvement
title: "[feat] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? For whom?
      placeholder: |
        Sales team currently has to export CSV to a spreadsheet to see monthly
        commissions. This costs ~15 min per rep per month.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
      placeholder: |
        Add a "Monthly summary" button to /admin/commissions that generates a
        PDF via lib/pdf-export.ts, matching the existing weekly report format.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why this specifically?

  - type: dropdown
    id: affected
    attributes:
      label: Who is affected?
      multiple: true
      options:
        - Customers (storefront)
        - Admin users
        - CRM / Sales team
        - Bot / WhatsApp users
        - Developers / maintainers

  - type: dropdown
    id: priority
    attributes:
      label: Priority (from your perspective)
      options:
        - Blocker — can't work without it
        - High — painful daily
        - Medium — annoying occasionally
        - Low — nice to have

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, mockups, data, related issues
